<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6cfa;
    --accent2: #fa6ca8;
    --text: #f0eff8;
    --muted: #6b6a7a;
    --done: #3a3a4a;
    --radius: 14px;
    --font-body: 'DM Sans', sans-serif;
    --font-title: 'Syne', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 80px;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 32px;
    animation: slideDown 0.5s ease both;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }

  .title {
    font-family: var(--font-title);
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .date-label {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .stats {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  .stats span {
    color: var(--accent);
    font-weight: 600;
  }

  /* Input area */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    animation: slideDown 0.5s 0.1s ease both;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 14px 14px 42px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .add-btn {
    padding: 14px 20px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .add-btn:hover { background: #6a5ae0; }
  .add-btn:active { transform: scale(0.97); }

  /* Filters */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    animation: slideDown 0.5s 0.15s ease both;
  }

  .filter-btn {
    padding: 7px 16px;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Task list */
  .list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    animation: slideIn 0.3s ease both;
    transition: border-color 0.2s, background 0.2s, opacity 0.3s;
  }

  .task-item:hover { border-color: rgba(124,108,250,0.3); background: var(--surface2); }
  .task-item.done-item { opacity: 0.5; }

  /* Custom checkbox */
  .check-wrap {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    position: relative;
    cursor: pointer;
  }

  .check-wrap input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    margin: 0;
  }

  .check-box {
    width: 22px;
    height: 22px;
    border: 2px solid var(--muted);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
    pointer-events: none;
  }

  .check-wrap input:checked ~ .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-box svg { opacity: 0; transition: opacity 0.15s; }
  .check-wrap input:checked ~ .check-box svg { opacity: 1; }

  .task-text {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.4;
    word-break: break-word;
    transition: color 0.2s;
    cursor: pointer;
    user-select: none;
  }

  .task-item.done-item .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .del-btn {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }

  .task-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--accent2); background: rgba(250,108,168,0.1); }

  /* Progress bar */
  .progress-wrap {
    margin-top: 24px;
    animation: slideDown 0.5s 0.2s ease both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-size: 14px;
    animation: fadeIn 0.3s ease;
  }

  .empty-icon { font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.4; }

  /* Clear done button */
  .clear-btn {
    display: block;
    margin: 16px auto 0;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-top">
      <h1 class="title">Mes tâches</h1>
      <span class="date-label" id="dateLabel"></span>
    </div>
    <p class="stats" id="stats"></p>
  </header>

  <div class="input-row">
    <div class="input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <input type="text" id="taskInput" placeholder="Ajouter une tâche…" autocomplete="off">
    </div>
    <button class="add-btn" onclick="addTask()">
      Ajouter
    </button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Toutes</button>
    <button class="filter-btn" data-filter="todo" onclick="setFilter('todo', this)">À faire</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Terminées</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-label">
      <span>Progression</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="clear-btn" onclick="clearDone()">Effacer les terminées</button>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('todo-pro') || '[]');
  let filter = 'all';

  // Date
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const now = new Date();
  document.getElementById('dateLabel').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;

  function save() { localStorage.setItem('todo-pro', JSON.stringify(tasks)); }

  function addTask() {
    const input = document.getElementById('taskInput');
    const val = input.value.trim();
    if (!val) { input.focus(); return; }
    tasks.unshift({ id: Date.now(), text: val, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('list');
    const total = tasks.length;
    const doneCount = tasks.filter(t => t.done).length;
    const pct = total ? Math.round(doneCount / total * 100) : 0;

    // Stats
    document.getElementById('stats').innerHTML =
      total ? `<span>${doneCount}</span> / ${total} tâche${total > 1 ? 's' : ''} terminée${doneCount > 1 ? 's' : ''}` : 'Aucune tâche pour le moment';

    // Progress
    const pw = document.getElementById('progressWrap');
    pw.style.display = total ? 'block' : 'none';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';

    // Filter
    const visible = tasks.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);

    if (!visible.length) {
      list.innerHTML = `<li class="empty"><span class="empty-icon">${filter === 'done' ? '🎉' : '📋'}</span>${filter === 'done' ? 'Aucune tâche terminée' : filter === 'todo' ? 'Tout est fait !' : 'Ajoutez votre première tâche'}</li>`;
      return;
    }

    list.innerHTML = '';
    visible.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' done-item' : '');
      li.innerHTML = `
        <label class="check-wrap">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
          <div class="check-box">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>
          </div>
        </label>
        <span class="task-text" onclick="toggleTask(${t.id})">${escapeHtml(t.text)}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Supprimer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      list.appendChild(li);
    });
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
