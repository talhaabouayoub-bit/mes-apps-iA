<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Convertisseur EUR ↔ DZD Pro</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080b12;--surface:#0f1420;--surface2:#161c2d;--surface3:#1d2438;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --accent:#00d26a;--accent-dim:rgba(0,210,106,0.12);--accent-glow:rgba(0,210,106,0.25);
      --gold:#ffd700;--gold-dim:rgba(255,215,0,0.08);--gold-border:rgba(255,215,0,0.2);
      --text:#f0eff8;--muted:rgba(255,255,255,0.42);--muted2:rgba(255,255,255,0.22);
      --danger:#ff6b6b;--blue:#5b9cf6;
      --radius-xl:28px;--radius-lg:20px;--radius-md:14px;--radius-sm:10px;
      --shadow:0 30px 90px rgba(0,0,0,0.5);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,210,106,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,106,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .page{position:relative;min-height:100vh;display:grid;place-items:start center;padding:36px 16px 80px;z-index:1}
    .blob{position:fixed;border-radius:999px;filter:blur(80px);z-index:0;pointer-events:none;opacity:0.6}
    .blob-a{width:400px;height:400px;top:-100px;left:-80px;background:rgba(0,210,106,0.18);animation:floatA 10s ease-in-out infinite}
    .blob-b{width:440px;height:440px;right:-100px;bottom:-100px;background:rgba(255,180,0,0.13);animation:floatB 13s ease-in-out infinite}
    .blob-c{width:280px;height:280px;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(91,156,246,0.07);animation:floatA 8s ease-in-out infinite reverse}
    .layout{width:min(100%,900px);display:grid;grid-template-columns:1fr 300px;gap:16px;position:relative;z-index:1}
    @media(max-width:820px){.layout{grid-template-columns:1fr}}
    .card{background:rgba(15,20,32,0.85);border:1px solid var(--border2);border-radius:var(--radius-xl);backdrop-filter:blur(24px);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.06);padding:28px;animation:fadeUp 0.65s cubic-bezier(.16,1,.3,1) both}
    .card-side{background:rgba(15,20,32,0.75);border:1px solid var(--border);border-radius:var(--radius-xl);backdrop-filter:blur(24px);box-shadow:var(--shadow);padding:22px;animation:fadeUp 0.65s 0.1s cubic-bezier(.16,1,.3,1) both;display:flex;flex-direction:column;gap:16px}
    .header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .logo{display:inline-flex;align-items:center;gap:10px;color:var(--accent);margin-bottom:8px;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s ease-in-out infinite}
    h1{font-family:'Syne',sans-serif;font-size:clamp(26px,3.5vw,40px);font-weight:800;letter-spacing:-0.03em;line-height:1;background:linear-gradient(135deg,#fff 50%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sub{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.7;max-width:50ch}
    .rate-box{min-width:230px;padding:14px 16px;border-radius:var(--radius-md);border:1px solid var(--gold-border);background:var(--gold-dim);flex-shrink:0}
    .rate-label{color:var(--muted);font-size:11px;margin-bottom:8px;letter-spacing:0.06em;text-transform:uppercase}
    .rate-display,.rate-editor{display:flex;align-items:center;gap:8px}
    .rate-button{border:none;background:transparent;padding:0;color:var(--gold);font:700 16px/1.2 'JetBrains Mono',monospace;cursor:pointer;text-align:left;transition:opacity 0.15s}
    .rate-button:hover{opacity:0.8}
    .rate-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s}
    .rate-input:focus{border-color:var(--accent)}
    .icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;font-size:16px;transition:all 0.15s;flex-shrink:0}
    .icon-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15)}
    .icon-btn.confirm{background:var(--accent);color:#000;border-color:transparent;font-weight:700}
    .icon-btn.confirm:hover{background:#00b85e}
    .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:18px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);padding:6px}
    .tab{min-height:48px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;padding:10px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all 0.2s;line-height:1.4}
    .tab:hover{color:var(--text);background:rgba(255,255,255,0.04)}
    .tab.active{background:var(--accent-dim);border-color:rgba(0,210,106,0.35);color:#fff}
    .banner{margin:0 0 16px;border:1px solid rgba(255,150,0,0.2);background:rgba(255,150,0,0.06);color:rgba(255,200,100,0.75);border-radius:12px;padding:11px 14px;font-size:11px;line-height:1.6}
    .input-wrap{display:grid;grid-template-columns:64px 1fr 52px;border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;background:rgba(255,255,255,0.03);margin-bottom:14px;transition:border-color 0.2s}
    .input-wrap:focus-within{border-color:rgba(0,210,106,0.4)}
    .currency-prefix{display:grid;place-items:center;background:rgba(255,255,255,0.04);color:var(--accent);font-size:16px;font-weight:700;min-height:64px;border-right:1px solid rgba(255,255,255,0.06)}
    .amount-input{width:100%;min-height:64px;background:transparent;border:none;outline:none;color:#fff;font-size:clamp(20px,3.5vw,30px);padding:0 16px;font-family:'JetBrains Mono',monospace}
    .amount-input::placeholder{color:rgba(255,255,255,0.15)}
    .clear-input-btn{display:grid;place-items:center;background:transparent;border:none;color:var(--muted2);cursor:pointer;font-size:20px;transition:color 0.15s;border-left:1px solid rgba(255,255,255,0.06)}
    .clear-input-btn:hover{color:var(--text)}
    .conversion-arrow{text-align:center;color:var(--accent);font-size:22px;margin:4px 0 12px;animation:arrowPulse 2s ease-in-out infinite}
    .result-box{border-radius:var(--radius-lg);padding:20px;margin-bottom:18px;border:1px solid rgba(0,210,106,0.2);background:linear-gradient(135deg,rgba(0,210,106,0.08),rgba(255,180,0,0.04));position:relative;overflow:hidden}
    .result-box::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 50%,rgba(0,210,106,0.07),transparent 60%);pointer-events:none}
    .result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .result-label{color:var(--muted);font-size:11px;letter-spacing:0.06em;text-transform:uppercase}
    .copy-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s}
    .copy-btn:hover{background:var(--accent-dim);border-color:rgba(0,210,106,0.3);color:var(--accent)}
    .copy-btn.copied{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .result-value{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:8px}
    .result-number{color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:32px;line-height:1;letter-spacing:0.01em}
    .result-unit{color:var(--accent);font-size:16px;font-weight:700}
    .formula{color:rgba(255,255,255,0.25);font-size:11px;line-height:1.7;word-break:break-word}
    .rates-table{width:100%;overflow:hidden;border-radius:var(--radius-md);border:1px solid var(--border);background:rgba(255,255,255,0.02);margin-bottom:6px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 14px;text-align:left;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.04)}
    th{color:var(--muted);font-weight:500;letter-spacing:0.04em;text-transform:uppercase;font-size:10px}
    td{color:#fff}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,0.02)}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
    .badge-mid{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,210,106,0.25)}
    .badge-info{background:rgba(255,215,0,0.1);color:var(--gold);border:1px solid rgba(255,215,0,0.2)}
    .footer-note{text-align:center;color:rgba(255,255,255,0.15);font-size:11px;margin-top:16px;line-height:1.5}
    .side-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
    .history-clear{background:transparent;border:none;color:var(--muted2);font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:color 0.15s}
    .history-clear:hover{color:var(--danger)}
    .history-list{display:flex;flex-direction:column;gap:8px}
    .history-empty{color:var(--muted2);font-size:12px;text-align:center;padding:24px 0}
    .history-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
    .history-item:hover{border-color:rgba(0,210,106,0.25);background:var(--surface3)}
    .history-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;opacity:0.6}
    .history-mode{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
    .history-conversion{font-size:12px;font-weight:700;color:var(--text)}
    .history-time{font-size:10px;color:var(--muted2);margin-top:4px}
    .history-copy{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--muted2);cursor:pointer;font-size:14px;opacity:0;transition:opacity 0.15s}
    .history-item:hover .history-copy{opacity:1}
    .history-copy:hover{color:var(--accent)}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
    .stat-label{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
    .stat-value{font-size:14px;font-weight:700;color:var(--text)}
    .stat-value.green{color:var(--accent)}
    .stat-value.gold{color:var(--gold)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:12px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:100;transition:transform 0.35s cubic-bezier(.16,1,.3,1),opacity 0.35s;opacity:0;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}
    @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,12px)}}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 10px var(--accent)}50%{opacity:0.5;box-shadow:0 0 4px var(--accent)}}
    @keyframes arrowPulse{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(3px);opacity:0.7}}
    @media(max-width:820px){.header{flex-direction:column}.rate-box{width:100%;min-width:0}.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:560px){.page{padding:12px}.card{padding:18px;border-radius:22px}.input-wrap{grid-template-columns:54px 1fr 48px}.currency-prefix{min-height:58px}.amount-input{min-height:58px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  const DEFAULT_RATE = 271;

  const MODES = {
    EUR_TO_DZD: {
      key:'EUR_TO_DZD', label:'€ → DZD',
      sourceSymbol:'€', sourceUnit:'€', resultUnit:'DA',
      sourceDecimals:2, resultDecimals:2,
      convert:(v,r) => v * r,
      formula:(v,r,res,f) => f(v,2)+' € × '+f(r,2)+' = '+f(res,2)+' DA'
    },
    DZD_TO_EUR: {
      key:'DZD_TO_EUR', label:'DZD → €',
      sourceSymbol:'DA', sourceUnit:'DA', resultUnit:'€',
      sourceDecimals:2, resultDecimals:4,
      convert:(v,r) => v / r,
      formula:(v,r,res,f) => f(v,2)+' DA ÷ '+f(r,2)+' = '+f(res,4)+' €'
    },
    CENTIMES_TO_EUR: {
      key:'CENTIMES_TO_EUR', label:'Centimes → €',
      sourceSymbol:'c', sourceUnit:'centimes DA', resultUnit:'€',
      sourceDecimals:0, resultDecimals:6,
      convert:(v,r) => (v/100)/r,
      formula:(v,r,res,f) => '('+f(v,0)+' ÷ 100) ÷ '+f(r,2)+' = '+f(res,6)+' €'
    },
    EUR_TO_CENTIMES: {
      key:'EUR_TO_CENTIMES', label:'€ → Centimes',
      sourceSymbol:'€', sourceUnit:'€', resultUnit:'centimes DA',
      sourceDecimals:2, resultDecimals:0,
      convert:(v,r) => Math.round(v*r*100),
      formula:(v,r,res,f) => f(v,2)+' € × '+f(r,2)+' × 100 = '+f(res,0)+' centimes'
    }
  };

  const fmt = (value, decimals) => {
    if (!Number.isFinite(value)) return '0';
    return value.toLocaleString('fr-FR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  };

  const fmtResult = (value, decimals) => {
    if (!Number.isFinite(value)) return '0';
    const abs = Math.abs(value);
    if (abs >= 1e9) {
      const n = value / 1e9;
      return n.toLocaleString('fr-FR', { minimumFractionDigits:0, maximumFractionDigits:3 }) + ' milliard' + (Math.abs(n) >= 2 ? 's' : '');
    }
    if (abs >= 1e6) {
      const n = value / 1e6;
      return n.toLocaleString('fr-FR', { minimumFractionDigits:0, maximumFractionDigits:3 }) + ' million' + (Math.abs(n) >= 2 ? 's' : '');
    }
    return value.toLocaleString('fr-FR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  };

  const fmtInput = (raw, decimalsAllowed) => {
    if (!raw) return '';
    const cleaned = raw.replace(/\s/g,'').replace(/,/g,'.').replace(/[^\d.]/g,'');
    const parts = cleaned.split('.');
    const intPart = parts[0] || '0';
    const decPart = parts.slice(1).join('').slice(0, decimalsAllowed);
    const intFmt = Number(intPart || '0').toLocaleString('fr-FR');
    if (cleaned.endsWith('.') && decimalsAllowed > 0) return intFmt + ',';
    if (decPart.length > 0 && decimalsAllowed > 0) return intFmt + ',' + decPart;
    return intFmt === '0' && !/[1-9]/.test(intPart) && raw.trim() !== '0' ? '' : intFmt;
  };

  const parseNum = (value) => {
    if (!value) return 0;
    const n = Number(String(value).replace(/\s/g,'').replace(/,/g,'.'));
    return Number.isFinite(n) ? n : 0;
  };

  function App() {
    const [modeKey,      setModeKey]      = useState('EUR_TO_DZD');
    const [rate,         setRate]         = useState(DEFAULT_RATE);
    const [rateDraft,    setRateDraft]    = useState(String(DEFAULT_RATE));
    const [editingRate,  setEditingRate]  = useState(false);
    const [rawAmount,    setRawAmount]    = useState(100);
    const [amountInput,  setAmountInput]  = useState('100');
    const [history,      setHistory]      = useState([]);
    const [copied,       setCopied]       = useState(false);
    const [toast,        setToast]        = useState({ show:false, msg:'' });
    const inputRef     = useRef(null);
    const rateInputRef = useRef(null);
    const toastTimer   = useRef(null);

    const mode        = MODES[modeKey];
    const result      = mode.convert(rawAmount, rate);
    const centimeEuro = 0.01 / rate;

    useEffect(() => { if (editingRate) rateInputRef.current && rateInputRef.current.focus(); }, [editingRate]);

    const switchMode = (newKey) => {
      const newMode = MODES[newKey];
      setModeKey(newKey);
      setAmountInput(fmt(rawAmount, newMode.sourceDecimals));
      setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
    };

    const handleAmountChange = (raw) => {
      setAmountInput(raw);
      setRawAmount(parseNum(raw));
    };

    const showToast = (msg) => {
      clearTimeout(toastTimer.current);
      setToast({ show:true, msg });
      toastTimer.current = setTimeout(() => setToast(t => ({ ...t, show:false })), 2200);
    };

    const copyResult = useCallback(() => {
      const text = fmtResult(result, mode.resultDecimals) + ' ' + mode.resultUnit;
      if (navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{});
      setCopied(true);
      showToast('Copié : ' + text);
      setTimeout(() => setCopied(false), 1800);
    }, [result, mode]);

    const addHistory = useCallback(() => {
      if (!rawAmount || !result) return;
      const entry = {
        id:   Date.now(),
        mode: mode.label,
        from: fmt(rawAmount, mode.sourceDecimals) + ' ' + mode.sourceUnit,
        to:   fmtResult(result, mode.resultDecimals) + ' ' + mode.resultUnit,
        time: new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })
      };
      setHistory(h => [entry, ...h].slice(0, 12));
      showToast("Ajouté à l'historique");
    }, [rawAmount, result, mode]);

    const copyHistoryItem = (item, e) => {
      e.stopPropagation();
      if (navigator.clipboard) navigator.clipboard.writeText(item.from + ' = ' + item.to).catch(()=>{});
      showToast('Copié !');
    };

    const submitRate = () => {
      const parsed = parseNum(rateDraft);
      if (parsed > 0) { setRate(parsed); setEditingRate(false); }
    };

    const resetRate = () => {
      setRate(DEFAULT_RATE);
      setRateDraft(String(DEFAULT_RATE));
      setEditingRate(false);
    };

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });

    return (
      <div className="page">
        <div className="blob blob-a" />
        <div className="blob blob-b" />
        <div className="blob blob-c" />

        <div className="layout">

          <main className="card">
            <div className="header">
              <div>
                <div className="logo"><div className="logo-dot" />EUR / DZD · {dateStr}</div>
                <h1>Convertisseur Euro ↔ Dinar</h1>
                <p className="sub">Quatre modes · Taux modifiable · Formules détaillées</p>
              </div>
              <section className="rate-box">
                <div className="rate-label">Taux de change</div>
                {!editingRate ? (
                  <div className="rate-display">
                    <button className="rate-button" onClick={() => { setRateDraft(String(rate)); setEditingRate(true); }}>
                      1 € = {fmt(rate,2)} DZD
                    </button>
                    <button className="icon-btn" onClick={resetRate}>↺</button>
                  </div>
                ) : (
                  <div className="rate-editor">
                    <input ref={rateInputRef} className="rate-input" value={rateDraft}
                      onChange={e => setRateDraft(e.target.value)}
                      onKeyDown={e => { if(e.key==='Enter') submitRate(); if(e.key==='Escape') setEditingRate(false); }} />
                    <button className="icon-btn confirm" onClick={submitRate}>✓</button>
                    <button className="icon-btn" onClick={resetRate}>↺</button>
                  </div>
                )}
              </section>
            </div>

            <div className="tabs">
              {Object.values(MODES).map(m => (
                <button key={m.key} className={'tab' + (m.key===modeKey ? ' active' : '')}
                  onClick={() => switchMode(m.key)}>
                  {m.label}
                </button>
              ))}
            </div>

            {(modeKey==='CENTIMES_TO_EUR' || modeKey==='EUR_TO_CENTIMES') && (
              <div className="banner">Mode centimes actif · 1 centime = 0,01 DA</div>
            )}

            <div className="input-wrap">
              <div className="currency-prefix">{mode.sourceSymbol}</div>
              <input ref={inputRef} className="amount-input" inputMode="decimal"
                value={amountInput} placeholder="0"
                onChange={e => handleAmountChange(fmtInput(e.target.value, mode.sourceDecimals))} />
              <button className="clear-input-btn"
                onClick={() => { setAmountInput(''); setRawAmount(0); inputRef.current && inputRef.current.focus(); }}>
                ×
              </button>
            </div>

            <div className="conversion-arrow">↓</div>

            <section className="result-box">
              <div className="result-header">
                <div className="result-label">Résultat</div>
                <div style={{display:'flex',gap:8}}>
                  <button className="copy-btn" onClick={addHistory}>
                    <span>＋</span> Historique
                  </button>
                  <button className={'copy-btn' + (copied?' copied':'')} onClick={copyResult}>
                    {copied ? '✓ Copié' : '⎘ Copier'}
                  </button>
                </div>
              </div>
              <div className="result-value">
                <span className="result-number">{fmtResult(result, mode.resultDecimals)}</span>
                <span className="result-unit">{mode.resultUnit}</span>
              </div>
              <div className="formula">{mode.formula(rawAmount, rate, result, fmt)}</div>
            </section>

            <section className="rates-table">
              <table>
                <thead><tr><th>Type</th><th>Taux</th><th>Détail</th></tr></thead>
                <tbody>
                  <tr>
                    <td><span className="badge badge-mid">Moyen</span></td>
                    <td>1 € = {fmt(rate,2)} DZD</td>
                    <td style={{color:'var(--muted)'}}>Taux actuel</td>
                  </tr>
                  <tr>
                    <td><span className="badge badge-info">1 c DA</span></td>
                    <td>{fmt(centimeEuro,6)} €</td>
                    <td style={{color:'var(--muted)'}}>0,01 DA ÷ taux</td>
                  </tr>
                </tbody>
              </table>
            </section>

            <p className="footer-note">※ Taux indicatifs · Non contractuels · Cliquez sur le taux pour le modifier</p>
          </main>

          <aside className="card-side">
            <div>
              <div className="side-title" style={{marginBottom:12}}>Stats rapides</div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Taux actuel</div>
                  <div className="stat-value gold">{fmt(rate,2)}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Résultat</div>
                  <div className="stat-value green">{fmtResult(result, mode.resultDecimals)}</div>
                </div>
              </div>
            </div>

            <div>
              <div className="side-title">
                Historique
                {history.length > 0 && (
                  <button className="history-clear" onClick={() => setHistory([])}>Effacer</button>
                )}
              </div>
              <div className="history-list" style={{marginTop:10}}>
                {history.length === 0 ? (
                  <div className="history-empty">Cliquez sur <strong>+ Historique</strong><br/>pour sauvegarder une conversion</div>
                ) : history.map(item => (
                  <div key={item.id} className="history-item">
                    <div className="history-mode">{item.mode}</div>
                    <div className="history-conversion">{item.from} = {item.to}</div>
                    <div className="history-time">{item.time}</div>
                    <button className="history-copy" onClick={e => copyHistoryItem(item, e)}>⎘</button>
                  </div>
                ))}
              </div>
            </div>
          </aside>

        </div>

        <div className={'toast' + (toast.show ? ' show' : '')}>
          <div className="toast-dot" />
          {toast.msg}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
