<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HVAC Pro — Calculateur Aéraulique</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c10;
      --s1: #0d1218;
      --s2: #121820;
      --s3: #18202a;
      --s4: #1e2830;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.11);
      --text: #e8edf2;
      --muted: rgba(255,255,255,0.38);
      --muted2: rgba(255,255,255,0.2);
      --cyan: #00d4ff;
      --cyan-dim: rgba(0,212,255,0.1);
      --cyan-glow: rgba(0,212,255,0.22);
      --green: #00e5a0;
      --green-dim: rgba(0,229,160,0.09);
      --amber: #ffb830;
      --amber-dim: rgba(255,184,48,0.08);
      --red: #ff5f6d;
      --red-dim: rgba(255,95,109,0.09);
      --mono: 'Space Mono', monospace;
      --sans: 'Outfit', sans-serif;
      --r-xl: 20px;
      --r-lg: 14px;
      --r-md: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 60px;
      overflow-x: hidden;
    }

    /* Subtle scan lines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.012) 2px, rgba(0,212,255,0.012) 4px);
      pointer-events: none; z-index: 0;
    }

    /* Corner glow */
    body::after {
      content: '';
      position: fixed; top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.07), transparent 70%);
      pointer-events: none; z-index: 0;
    }

    #root { max-width: 1140px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── APP SHELL ── */
    .app { display: flex; flex-direction: column; gap: 0; }

    /* ── HEADER ── */
    .header {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      position: relative; overflow: hidden;
      animation: fadeDown 0.5s ease both;
    }
    .header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    .header::after {
      content: '';
      position: absolute; top: -80px; right: -40px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,212,255,0.06), transparent 65%);
      pointer-events: none;
    }

    .brand { display: flex; align-items: center; gap: 16px; }
    .brand-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--cyan-dim); border: 1px solid var(--cyan-glow);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .brand-icon svg { width: 26px; height: 26px; color: var(--cyan); }
    .brand-text {}
    .brand-name {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      color: var(--cyan); letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 3px;
    }
    .brand-title {
      font-family: var(--sans); font-weight: 700; font-size: 22px;
      letter-spacing: -0.02em; color: var(--text);
    }

    .header-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 99px;
      border: 1px solid rgba(0,229,160,0.25); background: rgba(0,229,160,0.06);
      font-size: 12px; color: var(--green); font-family: var(--mono);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s ease-in-out infinite; }
    .header-date { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── NAV TABS ── */
    .nav {
      background: var(--s2);
      border-left: 1px solid var(--border2); border-right: 1px solid var(--border2);
      padding: 0 28px;
      display: flex; gap: 0; align-items: stretch;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.5s 0.05s ease both;
    }
    .nav-tab {
      display: flex; align-items: center; gap: 9px;
      padding: 16px 20px;
      background: transparent; border: none; border-bottom: 2px solid transparent;
      color: var(--muted); font-family: var(--sans); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      margin-bottom: -1px;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .nav-tab-icon { font-size: 16px; }
    .nav-badge {
      padding: 2px 7px; border-radius: 99px; font-size: 10px; font-family: var(--mono);
      background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(0,212,255,0.2);
    }

    /* ── BODY ── */
    .body {
      background: var(--s1);
      border: 1px solid var(--border2); border-top: none;
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      padding: 24px 28px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    /* ── LAYOUT GRID ── */
    .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 18px; }
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }
    @media (max-width: 720px) { .calc-grid { grid-template-columns: 1fr; } .nav { padding: 0 16px; } .header { padding: 18px; } .body { padding: 18px; } }

    /* ── CARDS ── */
    .card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      position: relative; overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--border2); }
    .card-accent-cyan::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--cyan), transparent); }
    .card-accent-green::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), transparent); }
    .card-accent-amber::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--amber), transparent); }

    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .card-icon {
      width: 34px; height: 34px; border-radius: 9px;
      display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
    }
    .card-icon-cyan { background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.18); }
    .card-icon-green { background: var(--green-dim); border: 1px solid rgba(0,229,160,0.18); }
    .card-icon-amber { background: var(--amber-dim); border: 1px solid rgba(255,184,48,0.18); }
    .card-title { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
    .card-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 14px; }
    .field:last-of-type { margin-bottom: 0; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-label {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 7px;
    }
    .field-label-text { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }
    .field-unit { font-family: var(--mono); font-size: 11px; color: var(--cyan); background: var(--cyan-dim); padding: 2px 7px; border-radius: 5px; border: 1px solid rgba(0,212,255,0.15); }
    .field-unit-green { color: var(--green); background: var(--green-dim); border-color: rgba(0,229,160,0.15); }
    .field-unit-amber { color: var(--amber); background: var(--amber-dim); border-color: rgba(255,184,48,0.15); }

    .inp {
      width: 100%; padding: 11px 14px;
      background: var(--s3); border: 1px solid var(--border2);
      border-radius: var(--r-md); color: var(--text);
      font-family: var(--mono); font-size: 16px; outline: none;
      transition: border-color 0.2s, background 0.2s;
      -moz-appearance: textfield;
    }
    .inp::-webkit-outer-spin-button, .inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .inp:focus { border-color: rgba(0,212,255,0.4); background: var(--s4); }
    .inp-green:focus { border-color: rgba(0,229,160,0.4); }
    .inp-amber:focus { border-color: rgba(255,184,48,0.4); }

    /* ── RESULT BOX ── */
    .result {
      margin-top: 18px; padding: 16px 18px;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, rgba(0,212,255,0.07), rgba(0,212,255,0.02));
      border: 1px solid rgba(0,212,255,0.18);
      animation: resultPop 0.25s ease;
    }
    .result-green { background: linear-gradient(135deg, rgba(0,229,160,0.07), rgba(0,229,160,0.02)); border-color: rgba(0,229,160,0.18); }
    .result-amber { background: linear-gradient(135deg, rgba(255,184,48,0.07), rgba(255,184,48,0.02)); border-color: rgba(255,184,48,0.18); }
    .result-red { background: linear-gradient(135deg, rgba(255,95,109,0.07), rgba(255,95,109,0.02)); border-color: rgba(255,95,109,0.25); }

    .result-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .result-main { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
    .result-value { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--cyan); line-height: 1; }
    .result-value-green { color: var(--green); }
    .result-value-amber { color: var(--amber); }
    .result-value-red { color: var(--red); }
    .result-unit2 { font-family: var(--mono); font-size: 14px; color: var(--muted); }
    .result-detail { font-size: 12px; color: var(--muted); line-height: 1.6; font-family: var(--mono); }
    .result-formula { font-size: 11px; color: var(--muted2); margin-top: 4px; font-family: var(--mono); }

    .result-invalid { padding: 16px 18px; border-radius: var(--r-lg); background: var(--s3); border: 1px solid var(--border); color: var(--muted); font-size: 13px; margin-top: 18px; text-align: center; }

    /* ── VELOCITY GAUGE ── */
    .v-gauge { margin-top: 10px; }
    .v-gauge-bar { height: 6px; border-radius: 99px; background: var(--s3); overflow: hidden; margin: 6px 0 4px; }
    .v-gauge-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease, background 0.4s ease; }
    .v-gauge-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted2); font-family: var(--mono); }
    .v-status { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-family: var(--mono); margin-top: 4px; }
    .v-ok { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.22); }
    .v-fast { background: rgba(255,184,48,0.12); color: var(--amber); border: 1px solid rgba(255,184,48,0.22); }
    .v-toofast { background: rgba(255,95,109,0.12); color: var(--red); border: 1px solid rgba(255,95,109,0.22); }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    /* ── SIDE PANEL ── */
    .side-panel { display: flex; flex-direction: column; gap: 16px; }
    .panel-section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); font-family: var(--mono); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── SUMMARY ITEMS ── */
    .summary-list { display: flex; flex-direction: column; gap: 8px; }
    .summary-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; border-radius: var(--r-md);
      background: var(--s3); border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .summary-item:hover { border-color: var(--border2); background: var(--s4); }
    .summary-item-left { display: flex; align-items: center; gap: 10px; }
    .summary-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .summary-item-label { font-size: 12px; color: var(--muted); }
    .summary-item-value { font-family: var(--mono); font-size: 13px; font-weight: 700; }

    /* ── QUICK REF ── */
    .ref-table { width: 100%; border-collapse: collapse; }
    .ref-table th, .ref-table td { padding: 8px 10px; text-align: left; font-size: 11px; border-bottom: 1px solid var(--border); }
    .ref-table th { color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
    .ref-table td { font-family: var(--mono); color: var(--text); }
    .ref-table tr:last-child td { border-bottom: none; }
    .ref-table tr:hover td { color: var(--cyan); }

    /* ── FORMULA PILL ── */
    .formula-block {
      padding: 12px 14px; border-radius: var(--r-md);
      background: var(--s3); border: 1px solid var(--border);
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      line-height: 1.8;
    }
    .formula-var { color: var(--cyan); }
    .formula-var-g { color: var(--green); }
    .formula-var-a { color: var(--amber); }

    /* ── PRESSURE TAB ── */
    .press-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 720px) { .press-grid { grid-template-columns: 1fr; } }

    .pressure-result-block {
      margin-top: 16px; padding: 14px 16px;
      border-radius: var(--r-lg); border: 1px solid var(--border);
      background: var(--s3);
    }
    .pressure-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .pressure-row:last-child { border-bottom: none; }
    .pressure-row-label { font-size: 12px; color: var(--muted); }
    .pressure-row-value { font-family: var(--mono); font-size: 13px; font-weight: 700; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px);
      background: var(--s4); border: 1px solid var(--border2);
      color: var(--text); padding: 11px 20px; border-radius: 99px;
      font-size: 13px; z-index: 99;
      transition: transform 0.3s cubic-bezier(.16,1,.3,1), opacity 0.3s;
      opacity: 0; white-space: nowrap; font-family: var(--mono);
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes blink    { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
    @keyframes resultPop{ from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useMemo, useState, useRef, useEffect } = React;
  const PI = Math.PI;
  const rnd = (v, d=1) => Number.isFinite(v) ? Number(v.toFixed(d)) : null;
  const areaCirc = d => PI * Math.pow(d/1000/2, 2);
  const areaRect = (w, h) => (w/1000) * (h/1000);
  const debit = (a, v) => a * v * 3600;

  const vStatus = (v) => {
    if (v <= 0) return null;
    if (v < 4) return { label: 'Trop lent', cls: 'v-toofast', color: '#ff5f6d' };
    if (v <= 8) return { label: 'Optimal', cls: 'v-ok', color: '#00e5a0' };
    if (v <= 12) return { label: 'Rapide', cls: 'v-fast', color: '#ffb830' };
    return { label: 'Excessif', cls: 'v-toofast', color: '#ff5f6d' };
  };

  const vGaugePct = v => Math.min(100, (v / 15) * 100);

  function NumInput({ value, onChange, step = 1, color = 'cyan', ...rest }) {
    return (
      <input className={`inp inp-${color}`} type="number" step={step}
        value={value} onChange={e => onChange(Number(e.target.value))} {...rest} />
    );
  }

  function FieldLabel({ text, unit, color = 'cyan' }) {
    return (
      <div className="field-label">
        <span className="field-label-text">{text}</span>
        <span className={`field-unit field-unit-${color}`}>{unit}</span>
      </div>
    );
  }

  function VGauge({ v }) {
    const pct = vGaugePct(v);
    const st = vStatus(v);
    const col = st ? st.color : 'var(--muted)';
    return (
      <div className="v-gauge">
        <div className="v-gauge-bar">
          <div className="v-gauge-fill" style={{ width: pct + '%', background: col }} />
        </div>
        <div className="v-gauge-labels"><span>0</span><span>4 opt.</span><span>8</span><span>12</span><span>15+</span></div>
        {st && <span className={`v-status ${st.cls}`}>{st.label} · {v} m/s</span>}
      </div>
    );
  }

  /* ── TAB: DÉBIT ── */
  function TabDebit({ onResult }) {
    const [d, setD] = useState(500);
    const [v1, setV1] = useState(7);
    const [w, setW] = useState(500);
    const [h, setH] = useState(250);
    const [v2, setV2] = useState(7);

    const circ = useMemo(() => {
      if (!(d > 0) || !(v1 >= 0)) return null;
      const a = areaCirc(d); return { a, q: debit(a, v1) };
    }, [d, v1]);

    const rect = useMemo(() => {
      if (!(w > 0) || !(h > 0) || !(v2 >= 0)) return null;
      const a = areaRect(w, h); return { a, q: debit(a, v2) };
    }, [w, h, v2]);

    useEffect(() => { onResult({ circ, rect, d, v1, w, h, v2 }); }, [circ, rect]);

    return (
      <div className="calc-grid">
        {/* Circulaire */}
        <div className="card card-accent-cyan">
          <div className="card-header">
            <div className="card-icon card-icon-cyan">⬤</div>
            <div>
              <div className="card-title">Gaine circulaire</div>
              <div className="card-subtitle">Section ronde · Q = A × V × 3600</div>
            </div>
          </div>

          <div className="field">
            <FieldLabel text="Diamètre" unit="mm" />
            <NumInput value={d} onChange={setD} min={50} max={2000} />
          </div>
          <div className="field">
            <FieldLabel text="Vitesse d'air" unit="m/s" />
            <NumInput value={v1} onChange={setV1} step={0.1} min={0} max={20} />
          </div>
          <VGauge v={v1} />

          {circ ? (
            <div className="result">
              <div className="result-label">Débit volumique</div>
              <div className="result-main">
                <span className="result-value">{rnd(circ.q, 1).toLocaleString('fr-FR')}</span>
                <span className="result-unit2">m³/h</span>
              </div>
              <div className="result-detail">
                Section = {circ.a.toFixed(5)} m² · Ø{d} mm · {v1} m/s
              </div>
              <div className="result-formula">Q = π×(D/2)² × V × 3600</div>
            </div>
          ) : <div className="result-invalid">⚠ Valeurs non valides</div>}
        </div>

        {/* Rectangulaire */}
        <div className="card card-accent-green">
          <div className="card-header">
            <div className="card-icon card-icon-green">▬</div>
            <div>
              <div className="card-title">Gaine rectangulaire</div>
              <div className="card-subtitle">Section rect. · Q = X × Y × V × 3600</div>
            </div>
          </div>

          <div className="field field-row">
            <div>
              <FieldLabel text="Largeur X" unit="mm" color="green" />
              <NumInput value={w} onChange={setW} color="green" min={50} max={3000} />
            </div>
            <div>
              <FieldLabel text="Hauteur Y" unit="mm" color="green" />
              <NumInput value={h} onChange={setH} color="green" min={50} max={3000} />
            </div>
          </div>
          <div className="field" style={{marginTop:14}}>
            <FieldLabel text="Vitesse d'air" unit="m/s" color="green" />
            <NumInput value={v2} onChange={setV2} step={0.1} color="green" min={0} max={20} />
          </div>
          <VGauge v={v2} />

          {rect ? (
            <div className="result result-green">
              <div className="result-label">Débit volumique</div>
              <div className="result-main">
                <span className="result-value result-value-green">{rnd(rect.q, 1).toLocaleString('fr-FR')}</span>
                <span className="result-unit2">m³/h</span>
              </div>
              <div className="result-detail">
                Section = {rect.a.toFixed(5)} m² · {w}×{h} mm · {v2} m/s
              </div>
              <div className="result-formula">Q = (X×Y) × V × 3600</div>
            </div>
          ) : <div className="result-invalid">⚠ Valeurs non valides</div>}
        </div>
      </div>
    );
  }

  /* ── TAB: CONVERSION ── */
  function TabConversion({ onResult }) {
    const [cD, setCD] = useState(500);
    const [fixH, setFixH] = useState(300);
    const [fixW, setFixW] = useState(400);
    const [rW, setRW] = useState(500);
    const [rH, setRH] = useState(250);

    const xFromY = useMemo(() => { if(!(cD>0)||!(fixH>0)) return null; return areaCirc(cD)/(fixH/1000)*1000; }, [cD, fixH]);
    const yFromX = useMemo(() => { if(!(cD>0)||!(fixW>0)) return null; return areaCirc(cD)/(fixW/1000)*1000; }, [cD, fixW]);
    const deq = useMemo(() => { if(!(rW>0)||!(rH>0)) return null; return Math.sqrt((4*areaRect(rW,rH))/PI)*1000; }, [rW, rH]);
    const ratio = useMemo(() => rW > 0 && rH > 0 ? rnd(Math.max(rW,rH)/Math.min(rW,rH), 2) : null, [rW, rH]);

    useEffect(() => { onResult({ xFromY, yFromX, deq, cD, fixH, fixW, rW, rH }); }, [xFromY, yFromX, deq]);

    return (
      <div className="calc-grid">
        {/* Circ → Rect */}
        <div className="card card-accent-cyan">
          <div className="card-header">
            <div className="card-icon card-icon-cyan">⬤→▬</div>
            <div>
              <div className="card-title">Circulaire → Rectangulaire</div>
              <div className="card-subtitle">Surface équivalente conservée</div>
            </div>
          </div>

          <div className="field">
            <FieldLabel text="Diamètre source" unit="mm" />
            <NumInput value={cD} onChange={setCD} min={50} max={2000} />
          </div>

          <hr className="divider" />

          <div className="field field-row">
            <div>
              <FieldLabel text="Fixer Hauteur Y" unit="mm" />
              <NumInput value={fixH} onChange={setFixH} min={50} />
            </div>
            <div>
              <FieldLabel text="Fixer Largeur X" unit="mm" />
              <NumInput value={fixW} onChange={setFixW} min={50} />
            </div>
          </div>

          {xFromY != null ? (
            <div className="result" style={{marginTop:14}}>
              <div className="result-label">Largeur X calculée</div>
              <div className="result-main"><span className="result-value">{rnd(xFromY,0)}</span><span className="result-unit2">mm</span></div>
              <div className="result-detail">Ø{cD} avec Y={fixH} mm</div>
            </div>
          ) : null}
          {yFromX != null ? (
            <div className="result" style={{marginTop:10}}>
              <div className="result-label">Hauteur Y calculée</div>
              <div className="result-main"><span className="result-value">{rnd(yFromX,0)}</span><span className="result-unit2">mm</span></div>
              <div className="result-detail">Ø{cD} avec X={fixW} mm</div>
            </div>
          ) : null}
        </div>

        {/* Rect → Circ */}
        <div className="card card-accent-green">
          <div className="card-header">
            <div className="card-icon card-icon-green">▬→⬤</div>
            <div>
              <div className="card-title">Rectangulaire → Diamètre équiv.</div>
              <div className="card-subtitle">D = √(4·X·Y / π)</div>
            </div>
          </div>

          <div className="field field-row">
            <div>
              <FieldLabel text="Largeur X" unit="mm" color="green" />
              <NumInput value={rW} onChange={setRW} color="green" min={50} />
            </div>
            <div>
              <FieldLabel text="Hauteur Y" unit="mm" color="green" />
              <NumInput value={rH} onChange={setRH} color="green" min={50} />
            </div>
          </div>

          {deq != null ? (
            <div className="result result-green" style={{marginTop:14}}>
              <div className="result-label">Diamètre équivalent</div>
              <div className="result-main"><span className="result-value result-value-green">{rnd(deq,0)}</span><span className="result-unit2">mm</span></div>
              <div className="result-detail">Section rect. {rW}×{rH} mm</div>
              <div className="result-formula">D = √(4·{rW}·{rH} / π)</div>
            </div>
          ) : <div className="result-invalid">⚠ Valeurs non valides</div>}

          {ratio && (
            <div style={{marginTop:12, padding:'10px 12px', borderRadius:10, background:'var(--s3)', border:'1px solid var(--border)', fontSize:12, color:'var(--muted)'}}>
              Rapport d'aspect : <span style={{color: ratio > 3 ? 'var(--red)' : ratio > 2 ? 'var(--amber)' : 'var(--green)', fontFamily:'var(--mono)', fontWeight:700}}>{ratio}:1</span>
              {ratio > 3 && <span style={{color:'var(--red)'}}> — déconseillé</span>}
              {ratio <= 2 && <span style={{color:'var(--green)'}}> — optimal</span>}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── TAB: PERTE DE CHARGE ── */
  function TabPression() {
    const [d, setD] = useState(500);
    const [v, setV] = useState(7);
    const [L, setL] = useState(10);
    const [rough, setRough] = useState(0.09);
    const [rho, setRho] = useState(1.2);
    const [mu, setMu] = useState(1.81e-5);

    const calc = useMemo(() => {
      if (!(d > 0) || !(v > 0) || !(L > 0)) return null;
      const D = d / 1000;
      const Re = (rho * v * D) / mu;
      let f;
      if (Re < 2300) { f = 64 / Re; }
      else {
        const eps = rough / 1000 / D;
        f = 0.25 / Math.pow(Math.log10(eps/3.7 + 5.74/Math.pow(Re, 0.9)), 2);
      }
      const dP_lin = f * (L / D) * 0.5 * rho * v * v;
      const dP_m = dP_lin / L;
      const regime = Re < 2300 ? 'Laminaire' : Re < 4000 ? 'Transition' : 'Turbulent';
      return { Re, f, dP_lin, dP_m, regime };
    }, [d, v, L, rough, rho, mu]);

    const dPColor = calc ? (calc.dP_m > 2 ? 'red' : calc.dP_m > 1 ? 'amber' : 'green') : 'cyan';

    return (
      <div className="press-grid">
        <div className="card card-accent-amber">
          <div className="card-header">
            <div className="card-icon card-icon-amber">⬇</div>
            <div>
              <div className="card-title">Perte de charge linéaire</div>
              <div className="card-subtitle">Formule de Darcy-Weisbach</div>
            </div>
          </div>

          <div className="field field-row">
            <div>
              <FieldLabel text="Diamètre" unit="mm" color="amber" />
              <NumInput value={d} onChange={setD} color="amber" min={50} />
            </div>
            <div>
              <FieldLabel text="Vitesse" unit="m/s" color="amber" />
              <NumInput value={v} onChange={setV} step={0.1} color="amber" min={0.1} />
            </div>
          </div>
          <div className="field">
            <FieldLabel text="Longueur tronçon" unit="m" color="amber" />
            <NumInput value={L} onChange={setL} step={0.5} color="amber" min={0.1} />
          </div>
          <div className="field field-row">
            <div>
              <FieldLabel text="Rugosité" unit="mm" color="amber" />
              <NumInput value={rough} onChange={setRough} step={0.01} color="amber" min={0.001} />
            </div>
            <div>
              <FieldLabel text="Densité air" unit="kg/m³" color="amber" />
              <NumInput value={rho} onChange={setRho} step={0.01} color="amber" min={0.5} />
            </div>
          </div>

          {calc ? (
            <div className={`result result-${dPColor}`} style={{marginTop:14}}>
              <div className="result-label">Perte de charge totale</div>
              <div className="result-main">
                <span className={`result-value result-value-${dPColor}`}>{rnd(calc.dP_lin, 2)}</span>
                <span className="result-unit2">Pa</span>
              </div>
              <div className="result-detail">Sur {L} m · soit {rnd(calc.dP_m, 3)} Pa/m</div>
            </div>
          ) : <div className="result-invalid">⚠ Valeurs non valides</div>}
        </div>

        <div className="card card-accent-amber">
          <div className="card-header">
            <div className="card-icon card-icon-amber">≋</div>
            <div>
              <div className="card-title">Paramètres aérauliques</div>
              <div className="card-subtitle">Reynolds · régime · coefficient</div>
            </div>
          </div>

          {calc ? (
            <div className="pressure-result-block">
              <div className="pressure-row">
                <span className="pressure-row-label">Nombre de Reynolds</span>
                <span className="pressure-row-value" style={{color:'var(--cyan)'}}>{Math.round(calc.Re).toLocaleString('fr-FR')}</span>
              </div>
              <div className="pressure-row">
                <span className="pressure-row-label">Régime d'écoulement</span>
                <span className="pressure-row-value" style={{color: calc.regime==='Laminaire' ? 'var(--green)' : calc.regime==='Transition' ? 'var(--amber)' : 'var(--cyan)'}}>{calc.regime}</span>
              </div>
              <div className="pressure-row">
                <span className="pressure-row-label">Coefficient de frottement λ</span>
                <span className="pressure-row-value">{calc.f.toFixed(5)}</span>
              </div>
              <div className="pressure-row">
                <span className="pressure-row-label">ΔP linéique</span>
                <span className="pressure-row-value">{rnd(calc.dP_m, 3)} Pa/m</span>
              </div>
              <div className="pressure-row">
                <span className="pressure-row-label">ΔP tronçon ({L} m)</span>
                <span className="pressure-row-value" style={{color:'var(--amber)'}}>{rnd(calc.dP_lin,2)} Pa</span>
              </div>
            </div>
          ) : (
            <div style={{padding:'28px 0', textAlign:'center', color:'var(--muted)', fontSize:13}}>
              Renseignez les paramètres à gauche
            </div>
          )}

          <div style={{marginTop:14}}>
            <div className="panel-section-title">Formules</div>
            <div className="formula-block">
              <div><span className="formula-var">Re</span> = ρ·V·D / μ</div>
              <div><span className="formula-var-a">ΔP</span> = λ·(L/D)·ρ·V²/2</div>
              <div><span className="formula-var-g">λ</span> = 64/Re (laminaire)</div>
              <div style={{color:'var(--muted2)',fontSize:11}}>Swamee-Jain (turbulent)</div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── SIDE PANEL ── */
  function SidePanel({ debitData, convData }) {
    const items = useMemo(() => {
      const list = [];
      if (debitData?.circ) list.push({ label: 'Q circ.', value: `${rnd(debitData.circ.q,0).toLocaleString('fr-FR')} m³/h`, color: 'var(--cyan)', dot: '#00d4ff' });
      if (debitData?.rect) list.push({ label: 'Q rect.', value: `${rnd(debitData.rect.q,0).toLocaleString('fr-FR')} m³/h`, color: 'var(--green)', dot: '#00e5a0' });
      if (convData?.deq != null) list.push({ label: 'Ø équiv.', value: `${rnd(convData.deq,0)} mm`, color: 'var(--amber)', dot: '#ffb830' });
      if (convData?.xFromY != null) list.push({ label: 'X calculé', value: `${rnd(convData.xFromY,0)} mm`, color: 'var(--cyan)', dot: '#00d4ff' });
      return list;
    }, [debitData, convData]);

    return (
      <div className="side-panel">
        {/* Summary */}
        <div className="card">
          <div className="panel-section-title">Résultats actifs</div>
          {items.length === 0 ? (
            <div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'12px 0'}}>Aucun résultat encore</div>
          ) : (
            <div className="summary-list">
              {items.map((it, i) => (
                <div className="summary-item" key={i}>
                  <div className="summary-item-left">
                    <div className="summary-item-dot" style={{background: it.dot}} />
                    <span className="summary-item-label">{it.label}</span>
                  </div>
                  <span className="summary-item-value" style={{color: it.color}}>{it.value}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Quick ref */}
        <div className="card">
          <div className="panel-section-title">Vitesses conseillées</div>
          <table className="ref-table">
            <thead><tr><th>Usage</th><th>V (m/s)</th></tr></thead>
            <tbody>
              <tr><td>Gaine principale</td><td>6 – 10</td></tr>
              <tr><td>Gaine secondaire</td><td>4 – 7</td></tr>
              <tr><td>Soufflage</td><td>2 – 4</td></tr>
              <tr><td>Reprise</td><td>1.5 – 3</td></tr>
              <tr><td>Désenfumage</td><td>8 – 12</td></tr>
            </tbody>
          </table>
        </div>

        {/* Quick ref sizes */}
        <div className="card">
          <div className="panel-section-title">Exemples de référence</div>
          <table className="ref-table">
            <thead><tr><th>Gaine</th><th>~Q m³/h</th></tr></thead>
            <tbody>
              <tr><td>Ø315 · 6 m/s</td><td>1 683</td></tr>
              <tr><td>Ø400 · 7 m/s</td><td>3 166</td></tr>
              <tr><td>Ø500 · 7 m/s</td><td>4 948</td></tr>
              <tr><td>Ø630 · 8 m/s</td><td>8 951</td></tr>
              <tr><td>400×200 · 6</td><td>1 728</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  /* ── APP ROOT ── */
  function App() {
    const [tab, setTab] = useState('debit');
    const [debitData, setDebitData] = useState(null);
    const [convData, setConvData] = useState(null);

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });

    const tabs = [
      { key:'debit',      label:'Débit volumique',    icon:'⬡', badge:'m³/h' },
      { key:'conversion', label:'Conversion gaines',  icon:'⇄', badge:'Ø↔□' },
      { key:'pression',   label:'Perte de charge',    icon:'⬇', badge:'Pa'   },
    ];

    return (
      <div className="app">
        {/* HEADER */}
        <div className="header">
          <div className="brand">
            <div className="brand-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                <path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4-4-1.79-4-4z"/>
                <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
              </svg>
            </div>
            <div className="brand-text">
              <div className="brand-name">HVAC · Aéraulique</div>
              <div className="brand-title">Calculateur Pro</div>
            </div>
          </div>
          <div className="header-meta">
            <div className="status-pill"><div className="status-dot" />Prêt</div>
            <div className="header-date">{dateStr}</div>
          </div>
        </div>

        {/* TABS NAV */}
        <nav className="nav">
          {tabs.map(t => (
            <button key={t.key} className={`nav-tab ${tab===t.key ? 'active' : ''}`} onClick={() => setTab(t.key)}>
              <span className="nav-tab-icon">{t.icon}</span>
              {t.label}
              <span className="nav-badge">{t.badge}</span>
            </button>
          ))}
        </nav>

        {/* BODY */}
        <div className="body">
          <div className="main-grid">
            <div>
              {tab === 'debit'      && <TabDebit      onResult={setDebitData} />}
              {tab === 'conversion' && <TabConversion onResult={setConvData}  />}
              {tab === 'pression'   && <TabPression />}
            </div>
            <SidePanel debitData={debitData} convData={convData} />
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
